<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In – Landmark Realtors</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <section class="auth-section">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required />
                </div>
                <button type="submit" class="btn-gold">Sign In</button>
            </form>
            <p class="auth-switch">
                Don't have an account?
                <a href="signup.html" class="link">Sign Up</a>
            </p>
            <p id="login-message" class="auth-message"></p>
        </div>
    </section>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/auth-ui.js"></script>
</body>
</html>
