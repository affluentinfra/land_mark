<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – Landmark Realtors</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <section class="auth-section">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required />
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required minlength="6" />
                </div>
                <button type="submit" class="btn-gold">Sign Up</button>
            </form>
            <p class="auth-switch">
                Already have an account?
                <a href="login.html" class="link">Sign In</a>
            </p>
            <p id="signup-message" class="auth-message"></p>
        </div>
    </section>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/auth-ui.js"></script>
</body>
</html>
