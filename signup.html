<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account – Landmark Realtors</title>
    <meta name="description" content="Register a new account with Landmark Realtors." />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <section class="auth-section">
        <div class="auth-card">
            <a href="/" class="logo-link" style="display:block;text-align:center;margin-bottom:1.5rem;">
                <img src="/assets/images/logo-dark.png" alt="Landmark Realtors" style="height:48px;object-fit:contain;">
            </a>
            <h2>Create Account</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for cat, msg in messages %}
                  <div class="auth-message" style="color: {{ '#4ade80' if cat == 'success' else '#f87171' }}; margin-bottom:1rem;">
                    <i class="fa-solid {{ 'fa-circle-check' if cat == 'success' else 'fa-circle-xmark' }}"></i> {{ msg }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form id="signup-form" method="POST" action="/signup">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@email.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password" />
                </div>
                <button type="submit" class="btn-gold" id="btn-signup-submit" style="width:100%;justify-content:center;margin-top:1rem;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="/login" class="link">Sign In</a>
            </p>
            <p class="auth-switch" style="margin-top:0.5rem;">
                <a href="/" class="link" style="color:var(--text-muted);">← Back to Home</a>
            </p>
        </div>
    </section>
</body>
</html>
